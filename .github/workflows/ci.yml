name: CI/CD Pipeline

on: 
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: job_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install 

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Setup Prisma Database Schema
      env:        
        DATABASE_URL_TEST: postgresql://postgres:password@localhost:5432/job_tracker_test?schema=public
      run: npx prisma db push

    - name: Run tests
      run: npm test
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/job_tracker_test?schema=public
        JWT_SECRET: test_secret
        ACCESS_TOKEN_SECRET: test_access_secret
        REFRESH_TOKEN_SECRET: test_refresh_secret